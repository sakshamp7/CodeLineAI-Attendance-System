<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Attendance | Codeline.Ai</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <link rel="icon" type="image/jpeg" href="1678044024774.jfif" />
  </head>
  <body>
    <canvas id="nokey"></canvas>

    <div class="main-container">
      <div class="header-section">
        <div class="logo-wrapper">
          <img src="1678044024774.jfif" alt="Codeline.Ai Logo" class="brand-logo" />
        </div>
        <h1 class="brand-name">Daily Attendance</h1>
        <p class="brand-tagline">Codeline.Ai Attendance System</p>
      </div>

      <nav style="display: flex; justify-content: center; gap: 20px; margin-bottom: 2rem;">
        <a href="/" style="background: var(--primary); box-shadow: 0 0 15px var(--primary-glow); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 50px; color: #fff; text-decoration: none; font-size: 0.9rem;"><i class="fas fa-calendar-check"></i> Attendance</a>
        <a href="/register" style="background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 50px; color: #fff; text-decoration: none; font-size: 0.9rem; transition: 0.3s;"><i class="fas fa-user-plus"></i> Registration</a>
      </nav>

      <div class="content-grid">
        <!-- Form Section -->
        <div class="card-wrap form-section">
          <h3 class="card-title" id="formTitle">User Information</h3>
          
          <form id="attendanceForm" class="attendance-form">
            <div class="form-group">
              <i class="fas fa-user icon"></i>
              <input type="text" id="name" placeholder="Full Name" required />
            </div>

            <div class="input-row">
              <div class="form-group">
                <i class="fas fa-mobile-alt icon"></i>
                <input type="text" id="mobile" placeholder="Mobile Number" required />
              </div>
              <div class="form-group">
                <i class="fas fa-envelope icon"></i>
                <input type="email" id="email" placeholder="Email Address" required />
              </div>
            </div>

            <div class="input-row">
              <div class="form-group readonly">
                <label><i class="fas fa-calendar-alt"></i> Date</label>
                <input type="text" id="date" disabled />
              </div>
              <div class="form-group">
                <label><i class="fas fa-clock"></i> In-Time</label>
                <input type="time" id="inTime" required />
              </div>
              <div class="form-group readonly">
                <label><i class="fas fa-clock"></i> Out-Time</label>
                <input type="text" id="outTime" readonly />
              </div>
            </div>

            <div class="form-group">
              <i class="fas fa-tasks icon"></i>
              <input type="text" id="topic" placeholder="Topic / Work Description" required />
            </div>

            <button type="submit" class="submit-btn">
              <i class="fas fa-paper-plane"></i> Submit Entry
            </button>
          </form>
        </div>

        <!-- Camera Section -->
        <div class="card-wrap camera-section-wrapper">
          <h3 class="card-title">Identity Verification</h3>
          <div class="camera-container">
            <div class="scanner-frame">
              <div class="scanner-line"></div>
              <div class="corner tl"></div>
              <div class="corner tr"></div>
              <div class="corner bl"></div>
              <div class="corner br"></div>
              <video id="video" autoplay></video>
              <div id="liveness-overlay" style="display:none; position:absolute; inset:0; background:rgba(138,43,226,0.2); backdrop-filter:blur(2px); z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; transition:all 0.3s ease;">
                <div id="liveness-icon" style="font-size:3rem; color:white; margin-bottom:15px;"><i class="fas fa-eye"></i></div>
                <div id="liveness-status" style="color:white; font-weight:700; font-size:1.1rem; text-shadow:0 2px 4px rgba(0,0,0,0.5);">PLEASE BLINK</div>
                <div style="width:60%; height:4px; background:rgba(255,255,255,0.2); border-radius:2px; margin-top:15px; overflow:hidden;">
                    <div id="liveness-progress" style="width:0%; height:100%; background:#8a2be2; transition:width 0.3s ease;"></div>
                </div>
              </div>
            </div>
            
            <div class="camera-controls">
              <button type="button" id="capture" class="capture-btn">
                <i class="fas fa-camera"></i> <span>Verify Face</span>
              </button>
              <p class="camera-hint">Align your face within the frame</p>
            </div>
            <canvas id="canvas" style="display: none"></canvas>
          </div>
        </div>
      </div>

      <div id="message" class="info-message" style="display: none"></div>
    </div>

    <div id="loader" class="spinner-overlay" style="display: none">
      <div class="spinner"></div>
      <p class="loader-text">Checking location...</p>
    </div>

    <div class="admin-link-container" style="text-align: center; margin-top: 2rem; padding-bottom: 2rem;">
        <a href="/admin" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; opacity: 0.7; transition: opacity 0.3s;">
            <i class="fas fa-user-shield"></i> Admin Dashboard
        </a>
    </div>

    <script src="script.js"></script>
  </body>
</html>
