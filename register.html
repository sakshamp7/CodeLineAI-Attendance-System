<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/jpeg" href="1678044024774.jfif">
    <style>
        .nav-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 2rem;
        }
        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }
    </style>
</head>
<body>
    <canvas id="nokey"></canvas>

    <div class="main-container">
        <div class="header-section">
            <div class="logo-wrapper">
                <img src="1678044024774.jfif" alt="Logo" class="brand-logo">
            </div>
            <h1 class="brand-name">Registration</h1>
            <p class="brand-tagline">Create your biometric profile</p>
        </div>

        <nav class="nav-bar">
            <a href="/" class="nav-btn"><i class="fas fa-calendar-check"></i> Attendance</a>
            <a href="/register" class="nav-btn active"><i class="fas fa-user-plus"></i> Registration</a>
        </nav>

        <div class="content-grid" style="grid-template-columns: 1fr 1.2fr;">
            <!-- Form Section -->
            <div class="card-wrap form-section">
                <h3 class="card-title">Student Details</h3>
                <form id="registrationForm" class="attendance-form">
                    <div class="form-group">
                        <i class="fas fa-user icon"></i>
                        <input type="text" id="name" placeholder="Enter Full Name" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-mobile-alt icon"></i>
                        <input type="text" id="mobile" placeholder="Mobile Number" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-envelope icon"></i>
                        <input type="email" id="email" placeholder="Email Address" required>
                    </div>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 1rem;">
                        <i class="fas fa-info-circle"></i> Make sure your face is clearly visible.
                    </p>
                </form>
            </div>

            <!-- Camera Section -->
            <div class="card-wrap camera-section-wrapper">
                <h3 class="card-title">Face Enrollment</h3>
                <div class="camera-container">
                    <div class="scanner-frame">
                        <div class="scanner-line"></div>
                        <video id="video" autoplay muted></video>
                        <div id="liveness-overlay" style="display:none; position:absolute; inset:0; background:rgba(138,43,226,0.2); backdrop-filter:blur(2px); z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
                            <div id="liveness-icon" style="font-size:3rem; color:white; margin-bottom:15px;"><i class="fas fa-eye"></i></div>
                            <div id="liveness-status" style="color:white; font-weight:700;">PLEASE BLINK</div>
                            <div style="width:60%; height:4px; background:rgba(255,255,255,0.2); border-radius:2px; margin-top:15px; overflow:hidden;">
                                <div id="liveness-progress" style="width:0%; height:100%; background:#8a2be2;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="camera-controls">
                        <button type="button" id="capture" class="capture-btn">
                            <i class="fas fa-camera"></i> <span>Register Face</span>
                        </button>
                    </div>
                    <canvas id="canvas" style="display: none"></canvas>
                </div>
            </div>
        </div>

        <div id="message" class="info-message" style="display: none"></div>
    </div>

    <div id="loader" class="spinner-overlay" style="display: none">
        <div class="spinner"></div>
        <p class="loader-text">Processing...</p>
    </div>

    <script src="script.js" data-page="registration"></script>
</body>
</html>
